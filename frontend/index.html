<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forum</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="app">
        <!-- Authentication View -->
        <div id="auth-view" class="view active">
            <div class="auth-container">
                <h1>Forum</h1>
                <div class="auth-tabs">
                    <button id="login-tab" class="auth-tab active">Login</button>
                    <button id="register-tab" class="auth-tab">Register</button>
                </div>

                <!-- Login Form -->
                <div id="login-form" class="auth-form active">
                    <h2>Login</h2>
                    <div id="login-error" class="error-message"></div>
                    <form id="loginForm">
                        <div class="form-group">
                            <label for="login-identifier">Nickname or Email:</label>
                            <input type="text" id="login-identifier" required>
                        </div>
                        <div class="form-group">
                            <label for="login-password">Password:</label>
                            <input type="password" id="login-password" required>
                        </div>
                        <button type="submit" class="btn btn-primary">Login</button>
                    </form>
                </div>

                <!-- Register Form -->
                <div id="register-form" class="auth-form">
                    <h2>Register</h2>
                    <div id="register-error" class="error-message"></div>
                    <form id="registerForm">
                        <div class="form-group">
                            <label for="register-nickname">Nickname:</label>
                            <input type="text" id="register-nickname" required minlength="3">
                        </div>
                        <div class="form-group">
                            <label for="register-email">Email:</label>
                            <input type="email" id="register-email" required>
                        </div>
                        <div class="form-group">
                            <label for="register-password">Password:</label>
                            <input type="password" id="register-password" required minlength="6">
                        </div>
                        <div class="form-group">
                            <label for="register-firstname">First Name:</label>
                            <input type="text" id="register-firstname" required>
                        </div>
                        <div class="form-group">
                            <label for="register-lastname">Last Name:</label>
                            <input type="text" id="register-lastname" required>
                        </div>
                        <div class="form-group">
                            <label for="register-age">Age:</label>
                            <input type="number" id="register-age" required min="13" max="120">
                        </div>
                        <div class="form-group">
                            <label for="register-gender">Gender:</label>
                            <select id="register-gender" required>
                                <option value="">Select gender</option>
                                <option value="male">Male</option>
                                <option value="female">Female</option>
                                <option value="other">Other</option>
                            </select>
                        </div>
                        <button type="submit" class="btn btn-primary">Register</button>
                    </form>
                </div>
            </div>
        </div>

        <!-- Main Forum View -->
        <div id="main-view" class="view hidden">
            <header class="header">
                <h1>Forum</h1>
                <div class="header-right">
                    <div class="connection-status">
                        <span id="ws-status" class="status-indicator offline">●</span>
                        <span id="ws-status-text">Connecting...</span>
                    </div>
                    <div class="user-info">
                        <span id="current-user">Welcome, <span id="user-nickname"></span></span>
                        <button id="logout-btn" class="btn btn-secondary">Logout</button>
                    </div>
                </div>
            </header>

            <main class="main-content">
                <div class="forum-container">
                    <!-- Create Post Section -->
                    <div class="create-post-section">
                        <h2>Create a Post</h2>
                        <div id="post-error" class="error-message"></div>
                        <form id="createPostForm">
                            <div class="form-group">
                                <input type="text" id="post-title" placeholder="Post Title" required minlength="3">
                            </div>
                            <div class="form-group">
                                <select id="post-category" required>
                                    <option value="">Select Category</option>
                                    <option value="general">General</option>
                                    <option value="technology">Technology</option>
                                    <option value="gaming">Gaming</option>
                                    <option value="music">Music</option>
                                    <option value="sports">Sports</option>
                                    <option value="other">Other</option>
                                </select>
                            </div>
                            <div class="form-group">
                                <textarea id="post-content" placeholder="What's on your mind?" required minlength="10" rows="4"></textarea>
                            </div>
                            <button type="submit" class="btn btn-primary">Post</button>
                        </form>
                    </div>

                    <!-- Filter Section -->
                    <div class="filter-section">
                        <label>Filter by category:</label>
                        <select id="category-filter">
                            <option value="">All Categories</option>
                            <option value="general">General</option>
                            <option value="technology">Technology</option>
                            <option value="gaming">Gaming</option>
                            <option value="music">Music</option>
                            <option value="sports">Sports</option>
                            <option value="other">Other</option>
                        </select>
                        <div class="online-users-count">
                            <span id="online-count">0</span> users online
                        </div>
                    </div>

                    <!-- Posts Feed -->
                    <div class="posts-feed">
                        <h2>Posts</h2>
                        <div id="posts-container">
                            <div class="loading">Loading posts...</div>
                        </div>
                    </div>
                </div>

                <!-- Post Detail Modal -->
                <div id="post-modal" class="modal hidden">
                    <div class="modal-content">
                        <span class="close-modal">&times;</span>
                        <div id="post-detail">
                            <!-- Post detail will be loaded here -->
                        </div>
                        <div class="comments-section">
                            <h3>Comments</h3>
                            <div id="comments-container"></div>
                            <form id="createCommentForm" class="comment-form">
                                <textarea id="comment-content" placeholder="Add a comment..." required rows="3"></textarea>
                                <button type="submit" class="btn btn-primary">Comment</button>
                            </form>
                        </div>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
