<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Real-time forum with posts, comments, and private messaging">
    <title>Forum - Real-time Discussions</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="app">
        <!-- Authentication View -->
        <div id="auth-view" class="view active" role="main" aria-label="Authentication">
            <div class="auth-container">
                <h1>Forum</h1>
                <div class="auth-tabs" role="tablist" aria-label="Authentication options">
                    <button id="login-tab" class="auth-tab active" role="tab" aria-selected="true" aria-controls="login-form">Login</button>
                    <button id="register-tab" class="auth-tab" role="tab" aria-selected="false" aria-controls="register-form">Register</button>
                </div>

                <!-- Login Form -->
                <div id="login-form" class="auth-form active" role="tabpanel" aria-labelledby="login-tab">
                    <h2>Login</h2>
                    <div id="login-error" class="error-message" role="alert" aria-live="polite"></div>
                    <form id="loginForm" aria-label="Login form">
                        <div class="form-group">
                            <label for="login-identifier">Nickname or Email:</label>
                            <input type="text" id="login-identifier" required>
                        </div>
                        <div class="form-group">
                            <label for="login-password">Password:</label>
                            <input type="password" id="login-password" required>
                        </div>
                        <button type="submit" class="btn btn-primary">Login</button>
                    </form>
                </div>

                <!-- Register Form -->
                <div id="register-form" class="auth-form" role="tabpanel" aria-labelledby="register-tab" hidden>
                    <h2>Register</h2>
                    <div id="register-error" class="error-message" role="alert" aria-live="polite"></div>
                    <form id="registerForm" aria-label="Registration form">
                        <div class="form-group">
                            <label for="register-nickname">Nickname:</label>
                            <input type="text" id="register-nickname" required minlength="3">
                        </div>
                        <div class="form-group">
                            <label for="register-email">Email:</label>
                            <input type="email" id="register-email" required>
                        </div>
                        <div class="form-group">
                            <label for="register-password">Password:</label>
                            <input type="password" id="register-password" required minlength="6">
                        </div>
                        <div class="form-group">
                            <label for="register-firstname">First Name:</label>
                            <input type="text" id="register-firstname" required>
                        </div>
                        <div class="form-group">
                            <label for="register-lastname">Last Name:</label>
                            <input type="text" id="register-lastname" required>
                        </div>
                        <div class="form-group">
                            <label for="register-age">Age:</label>
                            <input type="number" id="register-age" required min="13" max="120">
                        </div>
                        <div class="form-group">
                            <label for="register-gender">Gender:</label>
                            <select id="register-gender" required>
                                <option value="">Select gender</option>
                                <option value="male">Male</option>
                                <option value="female">Female</option>
                                <option value="other">Other</option>
                            </select>
                        </div>
                        <button type="submit" class="btn btn-primary">Register</button>
                    </form>
                </div>
            </div>
        </div>

        <!-- Main Forum View -->
        <div id="main-view" class="view hidden" role="main" aria-label="Forum">
            <header class="header" role="banner">
                <h1>Forum</h1>
                <div class="header-right">
                    <div class="connection-status" role="status" aria-live="polite">
                        <span id="ws-status" class="status-indicator offline" aria-hidden="true">●</span>
                        <span id="ws-status-text">Connecting...</span>
                    </div>
                    <div class="user-info">
                        <span id="current-user">Welcome, <span id="user-nickname"></span></span>
                        <button id="logout-btn" class="btn btn-secondary" aria-label="Logout from forum">Logout</button>
                    </div>
                </div>
            </header>

            <main class="main-content">
                <div class="main-layout">
                    <!-- Messaging Sidebar -->
                    <aside class="messaging-sidebar">
                        <div class="sidebar-header">
                            <h3>Messages</h3>
                            <button id="toggle-sidebar" class="btn-icon">◀</button>
                        </div>
                        <div class="online-users-list">
                            <h4>Online Users</h4>
                            <div id="online-users-container">
                                <div class="loading">Loading...</div>
                            </div>
                        </div>
                        <div class="conversations-list">
                            <h4>Recent Conversations</h4>
                            <div id="conversations-container">
                                <div class="no-conversations">No conversations yet</div>
                            </div>
                        </div>
                    </aside>

                    <!-- Message Thread Panel -->
                    <div id="message-panel" class="message-panel hidden">
                        <div class="message-panel-header">
                            <h3 id="chat-user-name">Select a user to chat</h3>
                            <button id="close-chat" class="btn-icon">✕</button>
                        </div>
                        <div id="messages-container" class="messages-container">
                            <div class="no-messages">Select a user to start chatting</div>
                        </div>
                        <form id="sendMessageForm" class="message-input-form">
                            <textarea id="message-input" placeholder="Type a message..." rows="2" required></textarea>
                            <button type="submit" class="btn btn-primary">Send</button>
                        </form>
                    </div>

                    <!-- Forum Content -->
                <div class="forum-container">
                    <!-- Create Post Section -->
                    <div class="create-post-section">
                        <h2>Create a Post</h2>
                        <div id="post-error" class="error-message"></div>
                        <form id="createPostForm">
                            <div class="form-group">
                                <input type="text" id="post-title" placeholder="Post Title" required minlength="3">
                            </div>
                            <div class="form-group">
                                <select id="post-category" required>
                                    <option value="">Select Category</option>
                                    <option value="general">General</option>
                                    <option value="technology">Technology</option>
                                    <option value="gaming">Gaming</option>
                                    <option value="music">Music</option>
                                    <option value="sports">Sports</option>
                                    <option value="other">Other</option>
                                </select>
                            </div>
                            <div class="form-group">
                                <textarea id="post-content" placeholder="What's on your mind?" required minlength="10" rows="4"></textarea>
                            </div>
                            <button type="submit" class="btn btn-primary">Post</button>
                        </form>
                    </div>

                    <!-- Filter Section -->
                    <div class="filter-section">
                        <label>Filter by category:</label>
                        <select id="category-filter">
                            <option value="">All Categories</option>
                            <option value="general">General</option>
                            <option value="technology">Technology</option>
                            <option value="gaming">Gaming</option>
                            <option value="music">Music</option>
                            <option value="sports">Sports</option>
                            <option value="other">Other</option>
                        </select>
                        <div class="online-users-count">
                            <span id="online-count">0</span> users online
                        </div>
                    </div>

                    <!-- Posts Feed -->
                    <div class="posts-feed">
                        <h2>Posts</h2>
                        <div id="posts-container">
                            <div class="loading">Loading posts...</div>
                        </div>
                    </div>
                </div>
                </div>

                <!-- Post Detail Modal -->
                <div id="post-modal" class="modal hidden">
                    <div class="modal-content">
                        <span class="close-modal">&times;</span>
                        <div id="post-detail">
                            <!-- Post detail will be loaded here -->
                        </div>
                        <div class="comments-section">
                            <h3>Comments</h3>
                            <div id="comments-container"></div>
                            <form id="createCommentForm" class="comment-form">
                                <textarea id="comment-content" placeholder="Add a comment..." required rows="3"></textarea>
                                <button type="submit" class="btn btn-primary">Comment</button>
                            </form>
                        </div>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
