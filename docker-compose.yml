services:
  forum:
    build:
      context: .
      dockerfile: backend/Dockerfile
    image: forum-backend:latest
    container_name: forum-backend
    ports:
      - "8000:8000"
    environment:
      ENVIRONMENT: production
      SERVER_PORT: "8000"
      FRONTEND_PATH: ./frontend
    volumes:
      - forum-data:/root/data

volumes:
  forum-data:
